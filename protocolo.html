<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<title>Ejemplo de imagen y PDF en una página HTML</title>
<body>
    <h1>Una imagen y un archivo PDF en una página HTML</h1>
    <img src="Molinos-Mota-del-Cuervo.jpg" alt="Molinos-paisaje" width="400">
    <p>Esta es una imagen de ejemplo</p>
    <embed src="quijote.pdf" width="500" height="700" type='application/pdf'>
    <p>Este es un archivo embed de ejemplo.</p>
</body>
</html>
